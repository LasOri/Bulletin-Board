name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: write  # Needed for GitHub Pages deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git for private repo access
        run: |
          # Configure git to use PAT for LINKER private repo
          git config --global url."https://${{ secrets.LINKER_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install Swift WASM SDK via Swiftly
        run: |
          echo "Installing Swiftly (Swift toolchain manager)..."

          # Install Swiftly
          curl -L https://swift-server.github.io/swiftly/swiftly-install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"

          # Install WASM toolchain using Swiftly
          echo "Installing Swift WASM toolchain..."
          swiftly install wasm-latest

          # Verify installation
          echo "Installed toolchains:"
          swiftly list

          # List SDKs
          echo "Available SDKs:"
          swift sdk list

          echo "✅ Swift WASM toolchain installed"

      - name: Run tests
        run: |
          echo "Running tests..."
          swift test
          echo "✅ All tests passed"

      - name: Build WASM binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building WASM binary with Swift SDK..."
          export PATH="$HOME/.local/bin:$PATH"

          # Get the installed WASM SDK identifier
          WASM_SDK=$(swift sdk list | grep wasm | awk '{print $1}' | head -1)
          echo "Using WASM SDK: $WASM_SDK"

          if [ -z "$WASM_SDK" ]; then
            echo "❌ No WASM SDK found"
            echo "Available SDKs:"
            swift sdk list
            exit 1
          fi

          # Build for WASM using the installed SDK
          swift build --swift-sdk "$WASM_SDK" -c release

          echo "✅ WASM binary created"
          find .build -name "*.wasm" -type f
          ls -lh .build/*/release/ 2>/dev/null || ls -lh .build/release/ 2>/dev/null || echo "Checking build output..."

      - name: Prepare deployment files
        run: |
          echo "Preparing deployment..."
          mkdir -p dist

          # Find WASM binary (location varies by SDK)
          WASM_FILE=$(find .build -name "BulletinBoard.wasm" -type f | head -1)

          if [ -z "$WASM_FILE" ]; then
            echo "❌ WASM binary not found"
            echo "Build directory contents:"
            find .build -type f -name "*.wasm" || echo "No .wasm files found"
            ls -R .build/ | head -50
            exit 1
          fi

          echo "Found WASM binary: $WASM_FILE"
          cp "$WASM_FILE" dist/BulletinBoard.wasm
          echo "✅ Copied WASM binary ($(ls -lh dist/BulletinBoard.wasm | awk '{print $5}'))"

          # Copy static assets (HTML, CSS, JS)
          if [ -d "Public" ]; then
            cp Public/index.html dist/
            cp Public/styles.css dist/
            cp Public/BulletinBoard.js dist/
            echo "✅ Copied static assets"
          else
            echo "❌ Public directory not found"
            exit 1
          fi

          # Create .nojekyll to prevent GitHub Pages from processing files
          touch dist/.nojekyll

          # List contents
          echo "📦 Deployment contents:"
          ls -lh dist/

          echo "✅ Deployment files prepared"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.sha }}'

      - name: Summary
        if: success()
        run: |
          echo "🎉 Build and deployment successful!"
          echo "📊 Tests: ✅ All 398 tests passed"
          echo "📦 WASM: ✅ Bundle created"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "🚀 Deploy: ✅ Published to GitHub Pages"
            echo "🌐 URL: https://${{ github.repository_owner }}.github.io/Bulletin-Board/"
          else
            echo "ℹ️  Skipping deployment (not main branch)"
          fi
