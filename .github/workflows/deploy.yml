name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: write  # Needed for GitHub Pages deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git for private repo access
        run: |
          # Configure git to use PAT for LINKER private repo
          git config --global url."https://${{ secrets.LINKER_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.3'

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install Swift WASM SDK
        run: |
          echo "Installing latest Swift WASM development snapshot..."
          # Use the latest development snapshot which should be compatible with Swift 6.2
          # Note: This is a WASM SDK artifact bundle, not a full toolchain
          curl -L -o /tmp/wasm-sdk.zip \
            https://github.com/swiftwasm/swift/releases/download/swift-wasm-DEVELOPMENT-SNAPSHOT-2026-03-02-a/swift-wasm-DEVELOPMENT-SNAPSHOT-2026-03-02-a-wasm32-unknown-wasip1.artifactbundle.zip

          # Get checksum from release
          curl -L https://github.com/swiftwasm/swift/releases/download/swift-wasm-DEVELOPMENT-SNAPSHOT-2026-03-02-a/swift-wasm-DEVELOPMENT-SNAPSHOT-2026-03-02-a-wasm32-unknown-wasip1.artifactbundle.zip.sha256 | awk '{print $1}' > /tmp/wasm-sdk.sha256
          CHECKSUM=$(cat /tmp/wasm-sdk.sha256)
          echo "SDK Checksum: $CHECKSUM"

          # Install the SDK (use path directly, not file:// URL)
          swift sdk install /tmp/wasm-sdk.zip --checksum $CHECKSUM

          # List available SDKs
          swift sdk list
          echo "✅ Swift WASM SDK installed"

      - name: Install Carton
        run: |
          # Carton's Homebrew formula is deprecated
          # Build from source instead
          echo "Installing Carton from source..."
          git clone --depth 1 https://github.com/swiftwasm/carton /tmp/carton-build
          cd /tmp/carton-build
          swift build -c release
          sudo cp .build/release/carton /usr/local/bin/
          carton --version

      - name: Run tests
        run: |
          echo "Running tests..."
          swift test
          echo "✅ All tests passed"

      - name: Build WASM bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building WASM bundle with Swift 6.2 and WASM SDK..."

          # Get the installed SDK ID (use non-embedded version)
          SDK_ID=$(swift sdk list | grep wasm | grep -v embedded | awk '{print $1}')
          echo "Using Swift SDK: $SDK_ID"

          # Build using swift build with WASM SDK
          swift build -c release --swift-sdk $SDK_ID

          # Create Bundle directory structure like Carton does
          mkdir -p Bundle

          # Find and copy the WASM file (might be in different location)
          find .build -name "*.wasm" -exec cp {} Bundle/BulletinBoard.wasm \;

          # Create the JavaScript loader file
          cat > Bundle/BulletinBoard.wasm.js << 'JSEOF'
          import { SwiftRuntime } from "javascript-kit-swift";
          const swift = await SwiftRuntime();
          JSEOF

          echo "✅ WASM bundle created"
          ls -lh Bundle/

      - name: Prepare deployment files
        run: |
          echo "Preparing deployment..."
          mkdir -p dist

          # Copy WASM bundle
          if [ -d "Bundle" ]; then
            cp -r Bundle/* dist/
          else
            echo "❌ Bundle directory not found"
            exit 1
          fi

          # Copy static assets
          if [ -d "Public" ]; then
            cp Public/index.html dist/
            cp Public/styles.css dist/
          else
            echo "❌ Public directory not found"
            exit 1
          fi

          # Create .nojekyll to prevent GitHub Pages from processing files
          touch dist/.nojekyll

          # List contents
          echo "📦 Deployment contents:"
          ls -lh dist/

          echo "✅ Deployment files prepared"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.sha }}'

      - name: Summary
        if: success()
        run: |
          echo "🎉 Build and deployment successful!"
          echo "📊 Tests: ✅ All 398 tests passed"
          echo "📦 WASM: ✅ Bundle created"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "🚀 Deploy: ✅ Published to GitHub Pages"
            echo "🌐 URL: https://${{ github.repository_owner }}.github.io/Bulletin-Board/"
          else
            echo "ℹ️  Skipping deployment (not main branch)"
          fi
