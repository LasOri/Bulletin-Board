name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: write  # Needed for GitHub Pages deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git for private repo access
        run: |
          # Configure git to use PAT for LINKER private repo
          git config --global url."https://${{ secrets.LINKER_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'  # Required for JavaScriptKit 0.46.5 (needs 6.1+)

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run tests
        run: |
          echo "Running tests..."
          swift test
          echo "✅ All tests passed"

      - name: Build WASM bundle with Carton plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building WASM bundle using Carton SwiftPM plugin..."

          # Carton provides SwiftPM plugins that are declared in LINKER's Package.swift
          # Use the CartonBundlePlugin directly
          swift package plugin carton bundle --release

          echo "✅ WASM bundle created"
          echo "Bundle contents:"
          ls -lh Bundle/ || ls -lh .build/plugins/outputs/ || find . -name "*.wasm" | head -5

      - name: Prepare deployment files
        run: |
          echo "Preparing deployment..."
          mkdir -p dist

          # Copy Carton bundle output
          if [ -d "Bundle" ]; then
            cp -r Bundle/* dist/
            echo "✅ Copied Carton bundle"
          else
            echo "❌ Bundle directory not found"
            exit 1
          fi

          # Overlay our custom files (HTML, CSS)
          if [ -d "Public" ]; then
            cp Public/index.html dist/ 2>/dev/null || echo "Using Carton's index.html"
            cp Public/styles.css dist/ 2>/dev/null || echo "No custom styles"
            echo "✅ Overlaid custom assets"
          fi

          # Create .nojekyll to prevent GitHub Pages from processing files
          touch dist/.nojekyll

          # List contents
          echo "📦 Deployment contents:"
          ls -lh dist/

          echo "✅ Deployment files prepared"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.sha }}'

      - name: Summary
        if: success()
        run: |
          echo "🎉 Build and deployment successful!"
          echo "📊 Tests: ✅ All 398 tests passed"
          echo "📦 WASM: ✅ Bundle created"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "🚀 Deploy: ✅ Published to GitHub Pages"
            echo "🌐 URL: https://${{ github.repository_owner }}.github.io/Bulletin-Board/"
          else
            echo "ℹ️  Skipping deployment (not main branch)"
          fi
