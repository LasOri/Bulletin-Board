name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: write  # Needed for GitHub Pages deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git for private repo access
        run: |
          # Configure git to use PAT for LINKER private repo
          git config --global url."https://${{ secrets.LINKER_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install Swift WASM SDK
        run: |
          echo "Installing Swift WASM SDK..."
          # Download and install Swift WASM SDK
          WASM_SDK_URL="https://github.com/swiftlang/swift/releases/download/swift-6.0.2-RELEASE/swift-6.0.2-RELEASE_wasm32-unknown-wasi.artifactbundle.zip"
          curl -L -o /tmp/wasm-sdk.zip "$WASM_SDK_URL"

          # Install SDK using Swift SDK command
          swift sdk install /tmp/wasm-sdk.zip --checksum 4c3e19644f57da39a27ade0b22de8a00d274e023fc2a6e061c7a5c9ceb4b682e

          # Verify installation
          swift sdk list
          echo "✅ Swift WASM SDK installed"

      - name: Run tests
        run: |
          echo "Running tests..."
          swift test
          echo "✅ All tests passed"

      - name: Build WASM binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building WASM binary with Swift SDK..."
          # Build for WASM using Swift SDK
          swift build --swift-sdk wasm32-unknown-wasi -c release

          echo "✅ WASM binary created"
          ls -lh .build/wasm32-unknown-wasi/release/

      - name: Prepare deployment files
        run: |
          echo "Preparing deployment..."
          mkdir -p dist

          # Copy WASM binary
          if [ -f ".build/wasm32-unknown-wasi/release/BulletinBoard.wasm" ]; then
            cp .build/wasm32-unknown-wasi/release/BulletinBoard.wasm dist/
            echo "✅ Copied WASM binary"
          else
            echo "❌ WASM binary not found"
            exit 1
          fi

          # Copy static assets (HTML, CSS, JS)
          if [ -d "Public" ]; then
            cp Public/index.html dist/
            cp Public/styles.css dist/
            cp Public/BulletinBoard.js dist/
            echo "✅ Copied static assets"
          else
            echo "❌ Public directory not found"
            exit 1
          fi

          # Create .nojekyll to prevent GitHub Pages from processing files
          touch dist/.nojekyll

          # List contents
          echo "📦 Deployment contents:"
          ls -lh dist/

          echo "✅ Deployment files prepared"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.sha }}'

      - name: Summary
        if: success()
        run: |
          echo "🎉 Build and deployment successful!"
          echo "📊 Tests: ✅ All 398 tests passed"
          echo "📦 WASM: ✅ Bundle created"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "🚀 Deploy: ✅ Published to GitHub Pages"
            echo "🌐 URL: https://${{ github.repository_owner }}.github.io/Bulletin-Board/"
          else
            echo "ℹ️  Skipping deployment (not main branch)"
          fi
